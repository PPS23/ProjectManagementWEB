


<div class="container-fluid main-content">
  <h2>Persons</h2>
  <form class="d-flex" role="search">
    <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search"/>
    <button class="btn btn-outline-success" type="submit">Search</button>
    <button class="btn btn-primary" data-toggle="modal" data-target="#addModal" (click)="clearForm()">New</button>
  </form>

  <div class="row">
    <table class="table table-hover">
      <thead>
        <tr>
          <th scope="col">Id</th>
          <th scope="col">First Name</th>
          <th scope="col">Last Name</th>
          <th scope="col">Is Active</th>
          <th scope="col"></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of persons">
          <th scope="row">{{ item.id }}</th>
          <td>{{ item.firstName }}</td>
          <td>{{ item.lastName }}</td>
          <td><span *ngIf="item.isActive; else inactiveTemp">Active</span><ng-template #inactiveTemp><span>Inactive</span></ng-template></td>
          <td>
            <div class="d-grid gap-2 d-md-block">
              <button type="button" class="btn btn-outline-info" (click)="editGetUserInfo(item.id)" >Edit</button> 
              <button type="button" class="btn btn-outline-danger" (click)="disable(item.id)">Disable</button>
            </div>
          </td>
        </tr>
      </tbody>
      <tfoot>
        <tr>
          <td colspan="100%">
            <div class="d-flex align-items-center">

              <!-- left side -->
              <div class="flex-fill"></div>

              <!-- center side -->
              <nav>
                <ul class="pagination mb-0">
                  <li class="page-item"><button role="button" [disabled]="currentPage <= 1" [class.disabled]="currentPage <= 1" class="page-link" (click)="previosPage()">Previous</button></li>
                  <li *ngFor="let page of totalPages" class="page-item"><button class="page-link" (click)="onPageChange(page)">{{page}}</button></li>
                  <li class="page-item"><button role="button" [disabled]="currentPage >= totalPages.length" [class.disabled]="currentPage >= totalPages.length" class="page-link" (click)="nextPage()")>Next</button></li>
                </ul>
              </nav>

              <!-- right side -->
              <div class="flex-fill d-flex justify-content-end align-items-center gap-2">
                <p class="mb-0">Total items</p> 
                <select class="form-control w-auto" (change)="onTotalItemsChange($event)" [(ngModel)]="selectedTotalItems">
                  <option>10</option>
                  <option>20</option>
                  <option>30</option>
                  <option>40</option>
                  <option>50</option>
                </select>
              </div>

            </div>
          </td>
        </tr>
      </tfoot>
    </table>
  </div>
</div>


<div class="modal fade" id="addModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Add new Person</h5>
      </div>
      <div class="modal-body">
        

        <form (ngSubmit)="add()" #addForm="ngForm" name="addForm">
          <div class="form-row">
            <div class="col-lg-12 mb-3">
              <label for="firstName">First name</label>
              <input [ngClass]="firstName.invalid && firstName.touched ? 'form-control is-invalid': 'form-control'" type="text" name="firstName" [(ngModel)]="person.firstName" #firstName="ngModel" required />
              <div *ngIf="firstName.invalid && firstName.touched" class="invalid-feedback">
                First name is required.
              </div>
            </div>

            <div class="col-lg-12 mb-3">
              <label for="firstName">Last name</label>
              <input [ngClass]="lastName.invalid && lastName.touched ? 'form-control is-invalid': 'form-control'" type="text" name="lastName" [(ngModel)]="person.lastName" #lastName="ngModel" required />
              <div *ngIf="lastName.invalid && lastName.touched" class="invalid-feedback">
                Last name is required.
              </div>
            </div>

          </div>
          
          <br />
          <button type="submit" class="btn btn-primary" [disabled]="addForm.invalid">Add</button>
        </form>

      </div>
    </div>
  </div>
</div>
