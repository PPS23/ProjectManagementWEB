
<div id="template-bg-1">
  <div class="d-flex flex-column min-vh-100 justify-content-center align-items-center">
    <div class="card p-3 text-dark bg-gradient-primary mb-5">
      <div class="card-header">
          <h3>Login</h3>
      </div>
      <div class="card-body w-100">
        <form name="loginForm" #loginForm="ngForm" (ngSubmit)="signin()">
          <div class="form-row">
            <div class="col-lg-12 mb-3">
              <label for="validationServer05">Domain name</label>
              <input type="text" [ngClass]="domainName.invalid && domainName.touched ? 'form-control is-invalid': 'form-control'"  placeholder="Domain name" name="domainName" #domainName="ngModel" [(ngModel)]="userModel.domainName" required>
              <div *ngIf="domainName.invalid && domainName.touched" class="invalid-feedback">
                Please provide a Domain name.
              </div>
            </div>

            <div class="col-lg-12">
              <label for="validationServer05">Password</label>
              <input type="password" [ngClass]="password.invalid && password.touched ? 'form-control is-invalid': 'form-control'"  placeholder="Password" name="password" #password="ngModel" [(ngModel)]="userModel.password" required>
              <div *ngIf="password.invalid && password.touched" class="invalid-feedback">
                Please provide a Password.
              </div>
            </div>
          </div>

          <div class="form-group mt-3">
            <input type="submit" value="Sign-in" [disabled]="loginForm.invalid" class="btn bg-primary float-end text-white w-100" name="login-btn">
          </div>
        </form>
      </div>
      <div class="card-footer">
        <div class="d-flex justify-content-center">
          <div class="text-primary"><button class="btn btn-link" data-toggle="modal" data-target="#recoverModal">Forgot Password?</button></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="recoverModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Recover Password</h5>
      </div>
      <div class="modal-body">

        <form (ngSubmit)="sendMail()" name="forgotPasswordForm" #forgotPasswordForm="ngForm">
          <div class="form-row">

            <div class="col-lg-12 mb-3">
              <label for="domainName">Domain Name</label>
              <input type="text" [ngClass]="domainName.invalid && domainName.touched ? 'form-control is-invalid': 'form-control'" name="domainName" [(ngModel)]="userModel.domainName" #domainName="ngModel" required/>
              <div *ngIf="domainName.invalid && domainName.touched" class="invalid-feedback">
                Domain name is required.
              </div>
            </div>

          </div>

          <button type="submit" class="btn btn-primary" [disabled]="forgotPasswordForm.invalid">Recover Password</button>
        </form>

      </div>
    </div>
  </div>
</div>
